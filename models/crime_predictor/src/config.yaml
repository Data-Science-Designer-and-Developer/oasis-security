# =============================================================================
# Oasis Security — Crime Predictor Configuration
# =============================================================================
# Champion model : LightGBM (R²=0.979 sur jeu de test)
# Cohérent avec model.py (CrimeRatePredictor) et train.py
# =============================================================================

model:
  # LightGBMRegressor hyperparameters (tuned via MLflow benchmark)
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  num_leaves: 64
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  n_jobs: -1
  verbose: -1

data:
  # URL canonique data.gouv.fr — Police Nationale & Gendarmerie Nationale
  # Données régionales depuis 2016, mise à jour annuelle
  url: "https://static.data.gouv.fr/resources/crimes-et-delits-enregistres-par-les-services-de-gendarmerie-et-de-police-depuis-2012/20240130-135737/donnee-reg-data.gouv-2024.csv"
  sep: ";"
  encoding: "utf-8"
  unite_de_compte: "nombre"
  target: "taux_100k"

server:
  host: "0.0.0.0"
  port: 8000

mlflow:
  experiment_name: "oasis-security-crime-predictor"
  registered_model_name: "crime_predictor_prod"
